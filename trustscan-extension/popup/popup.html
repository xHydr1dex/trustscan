<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrustScan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 180px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0a23;
      color: #fff;
      padding: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(124,58,237,0.12);
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 10px rgba(124,58,237,0.4);
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 14px; font-weight: 700; }
    .header-text p  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }

    .body { padding: 16px 18px; }

    /* State: idle */
    .state-idle .idle-msg {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .state-idle .platforms {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .platform-tag {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-scan {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      box-shadow: 0 3px 14px rgba(124,58,237,0.45);
      transition: opacity 0.15s;
    }
    .btn-scan:hover { opacity: 0.9; }
    .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

    /* State: results */
    .summary-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-box {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .stat-box.red   { background: rgba(220,38,38,0.1);  border-color: rgba(220,38,38,0.25); }
    .stat-box.amber { background: rgba(234,88,12,0.1);  border-color: rgba(234,88,12,0.25); }
    .stat-box.green { background: rgba(22,163,74,0.1);  border-color: rgba(22,163,74,0.25); }
    .stat-box .num  { font-size: 22px; font-weight: 800; line-height: 1; }
    .stat-box.red   .num { color: #f87171; }
    .stat-box.amber .num { color: #fb923c; }
    .stat-box.green .num { color: #4ade80; }
    .stat-box .lbl  { font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    .verdict {
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 10px;
    }
    .verdict.bad   { background: rgba(220,38,38,0.12); color: #f87171; border: 1px solid rgba(220,38,38,0.25); }
    .verdict.warn  { background: rgba(234,88,12,0.12); color: #fb923c; border: 1px solid rgba(234,88,12,0.25); }
    .verdict.good  { background: rgba(22,163,74,0.12); color: #4ade80; border: 1px solid rgba(22,163,74,0.25); }

    .rescan-row { display: flex; gap: 6px; margin-top: 8px; }
    .btn-rescan {
      flex: 1; padding: 8px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-rescan:hover { background: rgba(255,255,255,0.1); }

    .btn-dashboard {
      flex: 1; padding: 8px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; color: #A78BFA;
      background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2);
      text-decoration: none; display: flex; align-items: center; justify-content: center;
    }
    .btn-dashboard:hover { background: rgba(167,139,250,0.18); }

    /* State: not supported */
    .not-supported {
      font-size: 12px; color: rgba(255,255,255,0.35); text-align: center;
      padding: 20px 0; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡</div>
    <div class="header-text">
      <h1>TrustScan</h1>
      <p>Fake Review Detector</p>
    </div>
  </div>

  <div class="body" id="body">
    <!-- injected by popup.js -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
