<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M64 8 L108 26 L108 62 C108 88 88 108 64 120 C40 108 20 88 20 62 L20 26 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Inner shield highlight -->
  <path d="M64 18 L100 33 L100 62 C100 83 84 100 64 111 C44 100 28 83 28 62 L28 33 Z"
        fill="url(#innerGrad)" opacity="0.5"/>

  <!-- Checkmark -->
  <polyline points="42,64 56,80 86,50"
            fill="none" stroke="white" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
