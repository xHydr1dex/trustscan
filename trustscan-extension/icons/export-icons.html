<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrustScan — Export Icons</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f0f10; color: #e5e7eb; }
    h1 { color: #a5b4fc; margin-bottom: 0.5rem; }
    p { color: #9ca3af; margin-bottom: 2rem; }
    .previews { display: flex; gap: 2rem; align-items: flex-end; margin-bottom: 2rem; flex-wrap: wrap; }
    .preview { text-align: center; }
    .preview span { display: block; margin-top: 0.5rem; font-size: 0.8rem; color: #6b7280; }
    canvas { border-radius: 12px; background: #1e1e2e; }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; padding: 0.75rem 2rem;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>TrustScan Icon Exporter</h1>
  <p>Open this file in Chrome. Click the button to download all three icon sizes as PNG files.</p>

  <div class="previews">
    <div class="preview"><canvas id="c128" width="128" height="128"></canvas><span>128×128</span></div>
    <div class="preview"><canvas id="c48"  width="48"  height="48"></canvas><span>48×48</span></div>
    <div class="preview"><canvas id="c16"  width="16"  height="16"></canvas><span>16×16</span></div>
  </div>

  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <path d="M64 8 L108 26 L108 62 C108 88 88 108 64 120 C40 108 20 88 20 62 L20 26 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>
  <path d="M64 18 L100 33 L100 62 C100 83 84 100 64 111 C44 100 28 83 28 62 L28 33 Z"
        fill="url(#innerGrad)" opacity="0.5"/>
  <polyline points="42,64 56,80 86,50"
            fill="none" stroke="white" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

    const blob = new Blob([svgSrc], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);

    function drawToCanvas(canvasId, size) {
      return new Promise(resolve => {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, size, size);
          ctx.drawImage(img, 0, 0, size, size);
          resolve();
        };
        img.src = url;
      });
    }

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const a = document.createElement('a');
      a.download = filename;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    async function downloadAll() {
      await Promise.all([
        drawToCanvas('c128', 128),
        drawToCanvas('c48',  48),
        drawToCanvas('c16',  16),
      ]);
      download('c128', 'icon128.png');
      setTimeout(() => download('c48',  'icon48.png'),  300);
      setTimeout(() => download('c16',  'icon16.png'),  600);
    }

    // Render previews on load
    window.onload = () => downloadAll().catch(() => {
      drawToCanvas('c128', 128);
      drawToCanvas('c48',  48);
      drawToCanvas('c16',  16);
    });
  </script>
</body>
</html>
